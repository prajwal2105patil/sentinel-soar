id: RULE-CREDENTIAL-REVIEW-001
name: Credential Review (failed-then-success)
description: >
  Low-fidelity review signal: a user had one or more failed SSH auths immediately
  followed by a success from the SAME IP. Classic "was this a compromise or a
  typo?" question. Intentionally noisy — most hits are benign (mistyped password),
  so the agent triages with context and AUTO-SUPPRESSES the benign ones before they
  reach an analyst. This is what powers the False-Positive Reduction metric.
severity: low
kind: failed_then_success

# High-volume failures are already covered by RULE-BRUTE-FORCE-001; this rule only
# looks at the low-volume tail so it doesn't duplicate brute-force alerts.
params:
  max_failures: 4        # only fire when prior failures < brute-force threshold (5)
  window_seconds: 120

mitre: []                # not mapped; suppressed hits never escalate
