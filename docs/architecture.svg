  <line x1="384" y1="119" x2="430" y2="119" stroke="#64748b" stroke-width="2" marker-end="url(#arw)"/>
  <line x1="524" y1="146" x2="524" y2="186" stroke="#64748b" stroke-width="2" marker-end="url(#arw)"/>

