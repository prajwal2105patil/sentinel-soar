  <text x="34" y="556" font-size="11" fill="#475569">Scoreboard (synthetic labeled set): Precision/Recall/F1 1.00 · ATT&amp;CK coverage 5 · FP-reduction 100% · Cage 0 escapes · Audit 100% · Faithfulness 100%</text>
